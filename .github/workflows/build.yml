name: Build Legion AI° APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '18'
      - uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2
      - name: Install dependencies
        run: npm install
      - name: Make gradlew executable
        run: chmod +x android/gradlew
      - name: Download Gradle wrapper jar
        run: wget -q -O android/gradle/wrapper/gradle-wrapper.jar https://repo1.maven.org/maven2/org/gradle/gradle-wrapper/8.3/gradle-wrapper-8.3.jar
      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: LegionAI-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
